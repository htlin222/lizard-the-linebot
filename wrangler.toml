name = "lizard-the-linebot"
main = "src/index.ts"
compatibility_date = "2025-01-15"
workers_dev = true

# Secrets are set out-of-band:
#   wrangler secret put LINE_CHANNEL_SECRET
#   wrangler secret put LINE_CHANNEL_ACCESS_TOKEN
#   wrangler secret put TURSO_DATABASE_URL
#   wrangler secret put TURSO_AUTH_TOKEN
# Locally, put them in .dev.vars.

[observability]
enabled = true

# Binary content (image / video / audio / file) is downloaded from LINE
# and stored in this R2 bucket keyed by YYYY-MM/<messageId>.
# Create the bucket once:  wrangler r2 bucket create lizard-attachments
[[r2_buckets]]
binding = "ATTACHMENTS"
bucket_name = "lizard-attachments"
